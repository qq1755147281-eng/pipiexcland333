    <!-- Tailwind 配置 -->

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#121212',
                        'panel-dark': '#1E1E1E',
                        'pixel-yellow': '#FFD100',
                        'pixel-green': '#32CD32',
                        'pixel-purple': '#9370DB',
                        'text-primary': '#FFFFFF',
                        'text-secondary': '#CCCCCC',
                        'border-dark': '#333333'
                    },
                    fontFamily: {
                        'pixel': ['Press Start 2P', 'monospace']
                    },
                    boxShadow: {
                        'pixel': '0 0 0 1px #FFFFFF'
                    }

            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .pixel-border {
                image-rendering: pixelated;
                box-shadow: 0 0 0 1px #FFFFFF;
            }
            .pixel-button {
                image-rendering: pixelated;
                transition: transform 0.1s, background-color 0.1s;
            }
            .pixel-button:active {
                transform: scale(0.9);
                filter: brightness(0.8);
            }
            .pixel-text {
                font-family: 'Press Start 2P', monospace;
                letter-spacing: 0.05em;
                line-height: 1.5;
            }
            .pixel-grid {
                image-rendering: pixelated;
                background-size: 20px 20px;
                background-image: 
                    linear-gradient(to right, #333333 1px, transparent 1px),
                    linear-gradient(to bottom, #333333 1px, transparent 1px);
            }
            .color-picker-item {
                width: 24px;
                height: 24px;
                transition: transform 0.1s;
            }
            .color-picker-item:hover {
                transform: scale(1.1);
            }
            .color-picker-item.selected {
                box-shadow: 0 0 0 2px #FFD100;
            }
            .animate-marquee {
                animation: marquee 20s linear infinite;
            }
            @keyframes marquee {
                0% {
                    transform: translateX(100%);
                }
                100% {
                    transform: translateX(-100%);
                }
            }
            .star {
                position: absolute;
                background-color: white;
                border-radius: 50%;
                animation: twinkle 4s infinite ease-in-out;
            }
            .meteor {
                position: absolute;
                background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(147,112,219,0.5) 100%);
                height: 2px;
                transform-origin: top right;
                animation: meteor-fall 3s linear infinite;
            }
            .floating-circle {
                position: absolute;
                border-radius: 50%;
                animation: float 15s infinite ease-in-out;
            }
            .circle-red {
                width: 20px;
                height: 20px;
                background-color: rgba(255, 0, 0, 0.6);
            }
            .circle-green {
                width: 50px;
                height: 50px;
                background-color: rgba(0, 255, 0, 0.4);
            }
            .circle-blue {
                width: 35px;
                height: 35px;
                background-color: rgba(0, 0, 255, 0.5);
            }
            @keyframes twinkle {
                0%, 100% { opacity: 0.2; }
                50% { opacity: 0.8; }
            }
            @keyframes meteor-fall {
                0% {
                    transform: translate(-10%, -10%) rotate(45deg);
                    opacity: 0;
                }
                10% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translate(100vw, 100vh) rotate(45deg);
                    opacity: 0;
                }
            }
            @keyframes float {
                0%, 100% {
                    transform: translate(0, 0) rotate(0deg);
                }
                25% {
                    transform: translate(100px, -50px) rotate(90deg);
                }
                50% {
                    transform: translate(200px, 50px) rotate(180deg);
                }
                75% {
                    transform: translate(50px, 100px) rotate(270deg);
                }
            }
            .digit {
                position: absolute;
                color: #32CD32;
                font-family: 'Press Start 2P', monospace;
                font-size: 16px;
                animation: rotate 20s linear infinite;
                transform-origin: center 80px;
            }
            @keyframes rotate {
                from {
                    transform: rotate(0deg) translateY(-80px) rotate(0deg);
                }
                to {
                    transform: rotate(360deg) translateY(-80px) rotate(-360deg);
                }
            }
            .text-shadow {
                text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            }
            @keyframes colorChange1 {
                0%, 100% { color: white; }
                25% { color: red; }
                50% { color: purple; }
                75% { color: green; }
            }
            @keyframes colorChange2 {
                0%, 100% { color: white; }
                25% { color: green; }
                50% { color: red; }
                75% { color: purple; }
            }
            @keyframes colorChange3 {
                0%, 100% { color: white; }
                25% { color: purple; }
                50% { color: green; }
                75% { color: red; }
            }
            .text-animate-1 {
                animation: colorChange1 3s infinite;
            }
            .text-animate-2 {
                animation: colorChange2 4s infinite;
            }
            .text-animate-3 {
                animation: colorChange3 5s infinite;
            }
            @keyframes borderPulse1 {
                0%, 100% { 
                    box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7);
                    background-position: 0% 50%;
                }
                50% { 
                    box-shadow: 0 0 0 10px rgba(234, 179, 8, 0);
                    background-position: 100% 50%;
                }
            }
            @keyframes borderPulse2 {
                0%, 100% { 
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
                    background-position: 0% 50%;
                }
                50% { 
                    box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
                    background-position: 100% 50%;
                }
            }
            @keyframes borderPulse3 {
                0%, 100% { 
                    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
                    background-position: 0% 50%;
                }
                50% { 
                    box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
                    background-position: 100% 50%;
                }
            }
            .animate-border-pulse-1 {
                animation: borderPulse1 2s infinite;
                background-size: 200% 200%;
            }
            .animate-border-pulse-2 {
                animation: borderPulse2 3s infinite;
                background-size: 200% 200%;
            }
            .animate-border-pulse-3 {
                animation: borderPulse3 4s infinite;
                background-size: 200% 200%;
            }
            
            /* 复杂移动动画 - 自由轨迹运动 */
            @keyframes moveSquare1 {
                0% { transform: translate(-30px, -20px) rotate(0deg); opacity: 1; }
                10% { transform: translate(10px, -30px) rotate(45deg); opacity: 0.9; }
                20% { transform: translate(40px, -10px) rotate(90deg); opacity: 0.8; }
                30% { transform: translate(30px, 20px) rotate(135deg); opacity: 0.9; }
                40% { transform: translate(0px, 40px) rotate(180deg); opacity: 1; }
                50% { transform: translate(-20px, 30px) rotate(225deg); opacity: 0.9; }
                60% { transform: translate(-40px, 10px) rotate(270deg); opacity: 0.8; }
                70% { transform: translate(-30px, -10px) rotate(315deg); opacity: 0.9; }
                80% { transform: translate(-10px, -30px) rotate(360deg); opacity: 1; }
                90% { transform: translate(20px, -40px) rotate(405deg); opacity: 0.9; }
                100% { transform: translate(-30px, -20px) rotate(0deg); opacity: 1; }
            }
            
            /* 线形态移动动画 */
            @keyframes moveSquare2 {
                0% { transform: translate(-30px, 0) rotate(0deg) scaleX(1); opacity: 1; width: 24px; height: 24px; }
                15% { transform: translate(-10px, -20px) rotate(45deg) scaleX(2); opacity: 0.9; width: 12px; height: 24px; }
                30% { transform: translate(10px, -30px) rotate(90deg) scaleX(3); opacity: 0.8; width: 8px; height: 24px; }
                45% { transform: translate(30px, -10px) rotate(135deg) scaleX(2); opacity: 0.9; width: 12px; height: 24px; }
                60% { transform: translate(20px, 20px) rotate(180deg) scaleX(1); opacity: 1; width: 24px; height: 24px; }
                75% { transform: translate(0, 30px) rotate(225deg) scaleX(2); opacity: 0.9; width: 12px; height: 24px; }
                90% { transform: translate(-20px, 10px) rotate(270deg) scaleX(3); opacity: 0.8; width: 8px; height: 24px; }
                100% { transform: translate(-30px, 0) rotate(360deg) scaleX(1); opacity: 1; width: 24px; height: 24px; }
            }
            
            /* 贪吃蛇式运动 */
            @keyframes moveSquare3 {
                0% { transform: translate(-30px, 0) rotate(0deg); opacity: 1; }
                10% { transform: translate(0, 0) rotate(90deg); opacity: 1; }
                20% { transform: translate(0, 30px) rotate(180deg); opacity: 1; }
                30% { transform: translate(-30px, 30px) rotate(270deg); opacity: 1; }
                40% { transform: translate(-30px, 15px) rotate(0deg); opacity: 1; }
                50% { transform: translate(-15px, 15px) rotate(90deg); opacity: 1; }
                60% { transform: translate(-15px, 0) rotate(180deg); opacity: 1; }
                70% { transform: translate(-30px, 0) rotate(270deg); opacity: 1; }
                80% { transform: translate(-30px, -15px) rotate(0deg); opacity: 1; }
                90% { transform: translate(-15px, -15px) rotate(90deg); opacity: 1; }
                100% { transform: translate(-15px, 0) rotate(180deg); opacity: 1; }
            }
            
            /* 多形态变化动画 */
            @keyframes shapeChange1 {
                0%, 100% { border-radius: 0; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
                12.5% { border-radius: 50%; clip-path: circle(50% at 50% 50%); }
                25% { border-radius: 0; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
                37.5% { border-radius: 25%; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
                50% { border-radius: 0; clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
                62.5% { border-radius: 50%; clip-path: circle(50% at 50% 50%); }
                75% { border-radius: 0; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
                87.5% { border-radius: 25%; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
            }
            
            /* 线形态变化动画 */
            @keyframes shapeChange2 {
                0%, 100% { border-radius: 0; }
                25% { border-radius: 50% 50% 50% 50% / 0% 0% 100% 100%; }
                50% { border-radius: 0; }
                75% { border-radius: 50% 50% 50% 50% / 100% 0% 0% 100%; }
            }
            
            /* 8字形变化动画 */
            @keyframes shapeChange3 {
                0%, 100% { border-radius: 0; }
                25% { border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
                50% { border-radius: 50% 50% 50% 50% / 40% 60% 60% 40%; }
                75% { border-radius: 50% 50% 50% 50% / 60% 40% 40% 60%; }
            }
            
            /* 颜色变化动画 */
            @keyframes colorChange1 {
                0%, 100% { background-color: red; box-shadow: 0 0 15px red; }
                25% { background-color: green; box-shadow: 0 0 15px green; }
                50% { background-color: yellow; box-shadow: 0 0 15px yellow; }
                75% { background-color: white; box-shadow: 0 0 15px white; }
            }
            
            @keyframes colorChange2 {
                0%, 100% { background-color: white; box-shadow: 0 0 20px white; }
                25% { background-color: blue; box-shadow: 0 0 20px blue; }
                50% { background-color: white; box-shadow: 0 0 20px white; }
                75% { background-color: purple; box-shadow: 0 0 20px purple; }
            }
            
            @keyframes colorChange3 {
                0%, 100% { background-color: yellow; box-shadow: 0 0 15px yellow; }
                25% { background-color: red; box-shadow: 0 0 15px red; }
                50% { background-color: green; box-shadow: 0 0 15px green; }
                75% { background-color: white; box-shadow: 0 0 15px white; }
            }
            
            @keyframes colorChange4 {
                0%, 100% { background-color: #32CD32; box-shadow: 0 0 15px #32CD32; }
                25% { background-color: #00FFFF; box-shadow: 0 0 15px #00FFFF; }
                50% { background-color: #9370DB; box-shadow: 0 0 15px #9370DB; }
                75% { background-color: #FF0000; box-shadow: 0 0 15px #FF0000; }
            }
            
            /* 应用动画类 */
            .animate-move-square-1 {
                animation: moveSquare1 8s infinite ease-in-out;
            }
            
            .animate-move-square-2 {
                animation: moveSquare2 6s infinite ease-in-out;
            }
            
            .animate-move-square-3 {
                animation: moveSquare3 10s infinite linear;
            }
            
            .animate-shape-change-1 {
                animation: shapeChange1 8s infinite ease-in-out;
            }
            
            .animate-shape-change-2 {
                animation: shapeChange2 6s infinite ease-in-out;
            }
            
            .animate-shape-change-3 {
                animation: shapeChange3 10s infinite ease-in-out;
            }
            
            .animate-color-change-1 {
                animation: colorChange1 8s infinite ease-in-out;
            }
            
            .animate-color-change-2 {
                animation: colorChange2 6s infinite ease-in-out;
            }
            
            .animate-color-change-3 {
                animation: colorChange3 10s infinite ease-in-out;
            }
            
            .animate-color-change-4 {
                animation: colorChange4 8s infinite ease-in-out;
            }
            
            /* 轨迹效果 */
            .trail-1::before, .trail-1::after,
            .trail-2::before, .trail-2::after,
            .trail-3::before, .trail-3::after {
                content: '';
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: inherit;
                background-color: inherit;
                opacity: 0.6;
                z-index: -1;
                animation: trailMove 2s infinite linear;
            }
            
            .trail-1::before {
                animation-delay: 0.2s;
            }
            
            .trail-1::after {
                animation-delay: 0.4s;
            }
            
            .trail-2::before {
                animation-delay: 0.3s;
            }
            
            .trail-2::after {
                animation-delay: 0.6s;
            }
            
            .trail-3::before {
                animation-delay: 0.25s;
            }
            
            .trail-3::after {
                animation-delay: 0.5s;
            }
            
            .trail-4::before, .trail-4::after {
                content: '';
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: inherit;
                background-color: inherit;
                opacity: 0.6;
                z-index: -1;
                animation: trailMove 2s infinite linear;
            }
            
            .trail-4::before {
                animation-delay: 0.35s;
            }
            
            .trail-4::after {
                animation-delay: 0.7s;
            }
            
            @keyframes trailMove {
                0% {
                    transform: translate(0, 0) scale(1);
                    opacity: 0.6;
                }
                100% {
                    transform: translate(var(--trail-x, 0), var(--trail-y, 0)) scale(0.5);
                    opacity: 0;
                }
            }
        }
    </style>
</head>

    <script>
        // 初始化变量
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvasContainer');
        let gridSize = 20; // 网格大小
        let cellSize = 20; // 单元格大小
        let currentColor = '#FFFFFF'; // 当前选中颜色
        let zoom = 1; // 缩放级别
        let isDrawing = false; // 是否正在绘制

        // 设置画布大小
        function setupCanvas() {
            // 设置画布尺寸为容器的宽度，保持16:9比例
            const containerWidth = canvasContainer.clientWidth;
            const canvasHeight = containerWidth * 0.9; // 稍微调整比例以适应UI
            
            canvas.width = containerWidth;
            canvas.height = canvasHeight;
            
            // 计算网格大小，确保是整数
            gridSize = Math.floor(containerWidth / cellSize);
            
            // 重新绘制网格
            drawGrid();
        }

        // 绘制网格
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let x = 0; x <= gridSize; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, canvas.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let y = 0; y <= gridSize; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(canvas.width, y * cellSize);
                ctx.stroke();
            }
        }

        // 获取鼠标在画布上的网格位置
        function getGridPosition(event) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / (cellSize * zoom));
            const y = Math.floor((event.clientY - rect.top) / (cellSize * zoom));
            return { x, y };
        }

        // 绘制像素
        function drawPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            
            // 重绘该区域的网格线
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 1;
            
            // 垂直线
            ctx.beginPath();
            ctx.moveTo((x + 1) * cellSize, y * cellSize);
            ctx.lineTo((x + 1) * cellSize, (y + 1) * cellSize);
            ctx.stroke();
            
            // 水平线
            ctx.beginPath();
            ctx.moveTo(x * cellSize, (y + 1) * cellSize);
            ctx.lineTo((x + 1) * cellSize, (y + 1) * cellSize);
            ctx.stroke();
        }



        // 画布事件监听
        canvas.addEventListener('mousedown', function(event) {
            isDrawing = true;
            const pos = getGridPosition(event);
            drawPixel(pos.x, pos.y, currentColor);
        });

        canvas.addEventListener('mousemove', function(event) {
            if (isDrawing) {
                const pos = getGridPosition(event);
                drawPixel(pos.x, pos.y, currentColor);
            }
        });

        canvas.addEventListener('mouseup', function() {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', function() {
            isDrawing = false;
        });

        // 触摸事件支持
        canvas.addEventListener('touchstart', function(event) {
            event.preventDefault();
            const touch = event.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchmove', function(event) {
            event.preventDefault();
            const touch = event.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchend', function(event) {
            event.preventDefault();
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });







        // 创建背景特效
        function createBackgroundEffects() {
            const container = document.getElementById('backgroundEffects');
            const starCount = 50;
            const meteorInterval = 3000; // 每3秒生成一次流星
            
            // 创建星星
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // 随机大小和位置
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                
                // 随机动画延迟
                star.style.animationDelay = `${Math.random() * 4}s`;
                
                container.appendChild(star);
            }
            
            // 定期创建流星
            setInterval(() => {
                createMeteor();
                playDingSound();
            }, meteorInterval);
        }
        
        // 创建单个流星
        function createMeteor() {
            const container = document.getElementById('backgroundEffects');
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            
            // 随机长度和位置（包括中间和下方）
            const length = Math.random() * 150 + 50;
            meteor.style.width = `${length}px`;
            
            // 让流星从屏幕的不同高度出现（包括中间和下方）
            const startY = Math.random() * 70 - 10; // -10vh 到 60vh
            meteor.style.top = `${startY}vh`;
            
            // 随机水平位置
            meteor.style.left = `${Math.random() * 80 + 10}vw`;
            
            // 随机动画持续时间
            meteor.style.animationDuration = `${Math.random() * 3 + 2}s`;
            
            // 流星结束后移除元素
            meteor.addEventListener('animationend', () => {
                meteor.remove();
            });
            
            container.appendChild(meteor);
        }
        
        // 创建浮动圆圈
        function createFloatingCircles() {
            const container = document.getElementById('backgroundEffects');
            
            // 创建红色圆圈（2cm = 20px）
            createCircles('circle-red', 3);
            
            // 创建绿色圆圈（5cm = 50px）
            createCircles('circle-green', 3);
            
            // 创建蓝色圆圈（3.5cm = 35px）
            createCircles('circle-blue', 3);
            
            // 创建白色圆圈（3cm = 30px）
            createCircles('floating-circle', 3);
        }
        
        // 创建指定类型的圆圈
        function createCircles(circleClass, count) {
            const container = document.getElementById('backgroundEffects');
            
            for (let i = 0; i < count; i++) {
                const circle = document.createElement('div');
                circle.classList.add('floating-circle', circleClass);
                
                // 初始位置 - 确保在整个屏幕范围内分布
                circle.style.left = `${Math.random() * 90}vw`;
                circle.style.top = `${Math.random() * 90}vh`;
                
                // 随机动画延迟和持续时间
                circle.style.animationDelay = `${Math.random() * 5}s`;
                circle.style.animationDuration = `${Math.random() * 10 + 15}s`;
                
                container.appendChild(circle);
            }
        }
        
        // 播放叮咚音效
        function playDingSound() {
            const audio = document.getElementById('dingSound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        // 创建数字旋转效果
        function createDigitalOrbit() {
            const container = document.getElementById('digitalOrbit');
            const digits = '0123456789'.split('');
            
            digits.forEach((digit, index) => {
                const digitElement = document.createElement('div');
                digitElement.classList.add('digit');
                digitElement.textContent = digit;
                
                // 设置初始角度位置
                const angle = (index / digits.length) * 360;
                digitElement.style.animationDelay = `${index * 0.5}s`;
                
                container.appendChild(digitElement);
            });
            
            // 定期更新数字
            setInterval(() => {
                const digitElements = document.querySelectorAll('.digit');
                digitElements.forEach(el => {
                    el.textContent = Math.floor(Math.random() * 10);
                });
            }, 1000);
        }
        
        // 创建黑客帝国数字雨效果
        function createMatrixRain() {
            const canvas = document.getElementById('matrixRain');
            const ctx = canvas.getContext('2d');
            
            // 设置画布尺寸
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // 字符集 - 包含数字和一些符号
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@#$%^&*()*&^%+-/~{[|`]}';
            const charArray = chars.split('');
            
            // 列数和列宽
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            
            // 每列的y坐标数组
            const drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = 1;
            }
            
            // 绘制函数
            function draw() {
                // 半透明黑色背景，创建拖尾效果
                ctx.fillStyle = 'rgba(18, 18, 18, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 设置绿色文本
                ctx.fillStyle = '#32CD32';
                ctx.font = fontSize + 'px Press Start 2P';
                
                // 绘制字符
                for (let i = 0; i < drops.length; i++) {
                    // 随机字符
                    const text = charArray[Math.floor(Math.random() * charArray.length)];
                    
                    // 绘制字符
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    
                    // 随机重置列
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    
                    // 移动到下一个位置
                    drops[i]++;
                }
            }
            
            // 每33毫秒绘制一次
            setInterval(draw, 33);
            
            // 窗口大小改变时重新设置画布尺寸
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            });
        }

        // 添加轨迹效果的JavaScript支持
        function setupTrails() {
            const trailElements = document.querySelectorAll('[class*="trail-"]');
            
            trailElements.forEach(element => {
                // 为每个轨迹元素添加随机的轨迹方向
                const randomX = (Math.random() - 0.5) * 20;
                const randomY = (Math.random() - 0.5) * 20;
                element.style.setProperty('--trail-x', `${randomX}px`);
                element.style.setProperty('--trail-y', `${randomY}px`);
            });
        }
        
        // 初始化
        window.addEventListener('load', () => {
            setupCanvas();
            createBackgroundEffects();
            createFloatingCircles();
            createDigitalOrbit();
            createMatrixRain();
            setupButtons();
            setupTrails();
        });
        window.addEventListener('resize', setupCanvas);
    </script>
